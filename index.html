<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta http-equiv="X-UA-Compatible" content="ie=edge">
  <title>Happy Birthday!!! :)</title>
  <link href="https://fonts.googleapis.com/css?family=Work+Sans:300,400" rel="stylesheet">
  <link rel="shortcut icon" type="image/png" href="img/favicon.png" />
  <link rel="stylesheet" href="style/style.css">
  <style>
    .slideshow-container {
      max-width: 600px;
      position: relative;
      clear: both;
      margin: 60px auto 60px auto;
      display: none;
      overflow: hidden;
      border-radius: 10px;
      box-shadow: 0 4px 8px rgba(0, 0, 0, 0.2);
      z-index: 1;
    }

    .slides {
      display: flex;
      transition: transform 0.5s ease;
    }

    .slide {
      min-width: 100%;
      box-sizing: border-box;
    }

    .slide img {
      width: 100%;
      height: auto;
      display: block;
    }

    .prev,
    .next {
      cursor: pointer;
      position: absolute;
      top: 50%;
      transform: translateY(-50%);
      padding: 16px;
      color: white;
      font-weight: bold;
      font-size: 18px;
      background-color: rgba(0, 0, 0, 0.3);
      border-radius: 0 3px 3px 0;
      user-select: none;
      text-decoration: none;
      z-index: 10;
    }

    .prev {
      left: 0;
      border-radius: 0 3px 3px 0;
    }

    .next {
      right: 0;
      border-radius: 3px 0 0 3px;
    }

    .prev:hover,
    .next:hover {
      background-color: rgba(0, 0, 0, 0.8);
    }

    .dots {
      text-align: center;
      padding: 10px 0;
    }

    .dot {
      cursor: pointer;
      height: 12px;
      width: 12px;
      margin: 0 4px;
      background-color: #bbb;
      border-radius: 50%;
      display: inline-block;
      transition: background-color 0.3s ease;
    }

    .dot.active,
    .dot:hover {
      background-color: #717171;
    }

    .balloons {
      clear: both;
      margin-top: 40px;
      text-align: center;
    }

    .balloons img {
      width: 150px; /* 修改气球的宽度 */
      height: auto;
      margin: 0 10px; /* 添加间距 */
    }

    .final-content {
      display: none;
      text-align: center;
      margin-top: 40px;
    }
  </style>
</head>

<body>
  <div class="container">
    <div class="one">
      <h1>
        <span data-node-name="greeting">Hey</span>
        <span data-node-name="name">Esme</span>
      </h1>
      <p class="two" data-node-name="greetingText">I really like your name btw!</p>
    </div>

    <div class="balloons">
      <img src="img/ballon2.svg" alt="">
      <img src="img/ballon1.svg" alt="">
      <img src="img/ballon3.svg" alt="">
      <img src="img/ballon1.svg" alt="">
      <img src="img/ballon2.svg" alt="">
      <img src="img/ballon3.svg" alt="">
      <img src="img/ballon2.svg" alt="">
      <img src="img/ballon3.svg" alt="">
      <img src="img/ballon1.svg" alt="">
      <img src="img/ballon2.svg" alt="">
      <img src="img/ballon3.svg" alt="">
      <img src="img/ballon2.svg" alt="">
      <img src="img/ballon1.svg" alt="">
      <img src="img/ballon3.svg" alt="">
      <img src="img/ballon2.svg" alt="">
      <img src="img/ballon3.svg" alt="">
      <img src="img/ballon1.svg" alt="">
      <img src="img/ballon2.svg" alt="">
      <img src="img/ballon1.svg" alt="">
      <img src="img/ballon3.svg" alt="">
    </div>

    <div class="slideshow-container" id="slideshowContainer">
      <div class="slides" id="slides"></div>
      <a class="prev" onclick="changeSlide(-1)">❮</a>
      <a class="next" onclick="changeSlide(1)">❯</a>
      <div class="dots" id="dots"></div>
    </div>

    <div class="final-content" id="finalContent">
      <img src="img/lydia.png" alt="" class="lydia-dp" data-node-name="imagePath">
      <img src="img/hat.svg" alt="" class="hat">
      <div class="wish">
        <h3 class="wish-hbd" data-node-name="wishHeading">Happy Birthday!</h3>
        <h5 data-node-name="wishText">May the js.prototypes always be with you! ;)</h5>
      </div>
      <p data-node-name="outroText">Okay, now come back and tell me if you liked it.</p>
      <p id="replay" data-node-name="replayText">Or click, if you want to watch it again.</p>
      <p class="last-smile" data-node-name="outroSmiley">:)</p>
    </div>
  </div>
</body>

<script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/1.20.3/TweenMax.min.js"></script>
<script type="application/javascript" src="script/main.js"></script>

<script>
  (function() {
    const imageFiles = [];
    for (let i = 1; i <= 20; i++) {
      imageFiles.push(`img/P${i}.jpg`);
    }

    const slidesContainer = document.getElementById('slides');
    const dotsContainer = document.getElementById('dots');
    const slideshow = document.getElementById('slideshowContainer');
    const finalContent = document.getElementById('finalContent');
    let currentIndex = 0;
    let autoPlayInterval = null;

    imageFiles.forEach((src, index) => {
      const slideDiv = document.createElement('div');
      slideDiv.className = 'slide';
      const img = document.createElement('img');
      img.src = src;
      img.alt = `Birthday photo ${index + 1}`;
      slideDiv.appendChild(img);
      slidesContainer.appendChild(slideDiv);

      const dot = document.createElement('span');
      dot.className = 'dot';
      dot.setAttribute('onclick', `goToSlide(${index})`);
      dotsContainer.appendChild(dot);
    });

    function updateSlides() {
      slidesContainer.style.transform = `translateX(-${currentIndex * 100}%)`;
      const dots = document.querySelectorAll('.dot');
      dots.forEach((dot, i) => {
        dot.classList.toggle('active', i === currentIndex);
      });
    }

    window.changeSlide = function(direction) {
      if (!slideshow.style.display || slideshow.style.display === 'none') return;
      currentIndex = (currentIndex + direction + imageFiles.length) % imageFiles.length;
      updateSlides();
    };

    window.goToSlide = function(index) {
      if (!slideshow.style.display || slideshow.style.display === 'none') return;
      currentIndex = index;
      updateSlides();
    };

    updateSlides();

    setTimeout(function() {
      slideshow.style.display = 'block';

      autoPlayInterval = setInterval(function() {
        currentIndex = (currentIndex + 1) % imageFiles.length;
        updateSlides();
      }, 3000);

      setTimeout(function() {
        clearInterval(autoPlayInterval);
        autoPlayInterval = null;

        // 显示最终内容
        finalContent.style.display = 'block';
      }, 90000);
    }, 40000);
  })();
</script>

</html>
