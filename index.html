<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta http-equiv="X-UA-Compatible" content="ie=edge">
    <title>Happy Birthday!!! :)</title>
    <link href="https://fonts.googleapis.com/css?family=Work+Sans:300,400" rel="stylesheet">
    <link rel="shortcut icon" type="image/png" href="img/favicon.png" />
    <link rel="stylesheet" href="style/style.css">

    <style>
        /* 轮播容器 */
        .slideshow-container {
            max-width: 600px;
            position: relative;
            clear: both;
            margin: 60px auto;
            display: none;
            overflow: hidden;
            border-radius: 10px;
            box-shadow: 0 4px 8px rgba(0, 0, 0, 0.2);
            z-index: 1;
        }

        .slides {
            display: flex;
            transition: transform 0.5s ease;
        }

        .slide {
            min-width: 100%;
            box-sizing: border-box;
        }

        .slide img {
            width: 100%;
            height: auto;
            display: block;
        }

        .prev,
        .next {
            cursor: pointer;
            position: absolute;
            top: 50%;
            transform: translateY(-50%);
            padding: 16px;
            color: white;
            font-weight: bold;
            font-size: 18px;
            background-color: rgba(0, 0, 0, 0.3);
            border-radius: 0 3px 3px 0;
            user-select: none;
            text-decoration: none;
            z-index: 10;
        }

        .prev {
            left: 0;
            border-radius: 0 3px 3px 0;
        }

        .next {
            right: 0;
            border-radius: 3px 0 0 3px;
        }

        .prev:hover,
        .next:hover {
            background-color: rgba(0, 0, 0, 0.8);
        }

        .dots {
            text-align: center;
            padding: 10px 0;
        }

        .dot {
            cursor: pointer;
            height: 12px;
            width: 12px;
            margin: 0 4px;
            background-color: #bbb;
            border-radius: 50%;
            display: inline-block;
            transition: background-color 0.3s ease;
        }

        .dot.active,
        .dot:hover {
            background-color: #717171;
        }

        .baloons {
            display: none; /* 初始隐藏 */
            text-align: center;
            margin: 20px 0;
        }

        .content {
            display: none; /* 初始隐藏 */
            text-align: center;
            margin: 20px 0;
        }
    </style>
</head>

<body>
    <div class="container">
        <div class="baloons" id="balloonContainer">
            <!-- 气球部分 -->
            <img src="img/ballon2.svg" alt="">
            <img src="img/ballon1.svg" alt="">
            <img src="img/ballon3.svg" alt="">
            <img src="img/ballon1.svg" alt="">
            <img src="img/ballon2.svg" alt="">
            <img src="img/ballon3.svg" alt="">
            <img src="img/ballon2.svg" alt="">
            <img src="img/ballon3.svg" alt="">
            <img src="img/ballon1.svg" alt="">
            <img src="img/ballon2.svg" alt="">
            <img src="img/ballon3.svg" alt="">
            <img src="img/ballon2.svg" alt="">
            <img src="img/ballon1.svg" alt="">
            <img src="img/ballon3.svg" alt="">
            <img src="img/ballon2.svg" alt="">
            <img src="img/ballon3.svg" alt="">
            <img src="img/ballon1.svg" alt="">
            <img src="img/ballon2.svg" alt="">
            <img src="img/ballon1.svg" alt="">
            <img src="img/ballon3.svg" alt="">
            <img src="img/ballon3.svg" alt="">
            <img src="img/ballon1.svg" alt="">
            <img src="img/ballon2.svg" alt="">
            <img src="img/ballon3.svg" alt="">
            <img src="img/ballon2.svg" alt="">
            <img src="img/ballon1.svg" alt="">
            <img src="img/ballon3.svg" alt="">
            <img src="img/ballon2.svg" alt="">
            <img src="img/ballon3.svg" alt="">
            <img src="img/ballon1.svg" alt="">
            <img src="img/ballon2.svg" alt="">
            <img src="img/ballon1.svg" alt="">
            <img src="img/ballon3.svg" alt="">
        </div>

        <div class="slideshow-container" id="slideshowContainer">
            <div class="slides" id="slides"></div>
            <a class="prev" onclick="changeSlide(-1)">❮</a>
            <a class="next" onclick="changeSlide(1)">❯</a>
            <div class="dots" id="dots"></div>
        </div>

        <div class="content" id="mainContent">
            <img src="img/lydia.png.png" alt="" class="lydia-dp" id="lydiaImage">
            <img src="img/hat.svg" alt="" class="hat">
            <div class="wish">
                <h3 class="wish-hbd">Happy Birthday!</h3>
                <h5>May the js.prototypes always be with you! ;)</h5>
            </div>
            <p id="outroText">Okay, now come back and tell me if you liked it.</p>
            <p id="replay" data-node-name="replayText">Or click, if you want to watch it again.</p>
            <p class="last-smile">:)</p>
        </div>
    </div>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/1.20.3/TweenMax.min.js"></script>
    <script type="application/javascript">
        const fetchData = () => {
            fetch("customize.json")
                .then(data => data.json())
                .then(data => {
                    const dataArr = Object.keys(data);
                    dataArr.map(customData => {
                        if (data[customData] !== "") {
                            if (customData === "imagePath") {
                                document
                                    .querySelector(`[data-node-name*="${customData}"]`)
                                    .setAttribute("src", data[customData]);
                            } else {
                                document.querySelector(`[data-node-name*="${customData}"]`).innerText = data[customData];
                            }
                        }

                        // 检查是否迭代完成
                        if (dataArr.length === dataArr.indexOf(customData) + 1) {
                            animationTimeline();
                        }
                    });
                });
        };

        // 动画时间线
        const animationTimeline = () => {
            const tl = new TimelineMax();

            // 动画内容
            tl.to(".container", 0.1, { visibility: "visible" })
              .from("#balloonContainer", 1, { opacity: 0, y: 50 }) // 气球动画
              .to("#balloonContainer", 1, { opacity: 0, y: 50, delay: 2 })
              .from("#slideshowContainer", 1, { opacity: 0 }) // 轮播动画
              .to("#slideshowContainer", 1, { display: "block", opacity: 1 })
              .staggerFromTo("#slides img", 1, { scale: 0.5, opacity: 0 }, { scale: 1, opacity: 1 }, 0.2, "+=1")
              .to("#slideshowContainer", 1, { display: "none", opacity: 0 })
              .from("#mainContent", 1, { scale: 0.5, opacity: 0 }); // 祝福信息的动画

            // 添加点击重播事件
            const replyBtn = document.getElementById("replay");
            replyBtn.addEventListener("click", () => {
                tl.restart();
            });
        };

        // 轮播逻辑
        const imageFiles = [];
        for (let i = 1; i <= 20; i++) {
            imageFiles.push(`img/P${i}.jpg`);
        }

        const slidesContainer = document.getElementById('slides');
        const dotsContainer = document.getElementById('dots');
        let currentIndex = 0;
        let autoPlayInterval = null;

        // 动态创建轮播幻灯片和指示点
        imageFiles.forEach((src, index) => {
            const slideDiv = document.createElement('div');
            slideDiv.className = 'slide';
            const img = document.createElement('img');
            img.src = src;
            img.alt = `Birthday photo ${index + 1}`;
            slideDiv.appendChild(img);
            slidesContainer.appendChild(slideDiv);

            const dot = document.createElement('span');
            dot.className = 'dot';
            dot.setAttribute('onclick', `goToSlide(${index})`);
            dotsContainer.appendChild(dot);
        });

        // 更新轮播
        const updateSlides = () => {
            slidesContainer.style.transform = `translateX(-${currentIndex * 100}%)`;
            const dots = document.querySelectorAll('.dot');
            dots.forEach((dot, i) => {
                dot.classList.toggle('active', i === currentIndex);
            });
        };

        // 切换幻灯片
        window.changeSlide = function(direction) {
            currentIndex = (currentIndex + direction + imageFiles.length) % imageFiles.length;
            updateSlides();
        };

        // 跳转到指定幻灯片
        window.goToSlide = function(index) {
            currentIndex = index;
            updateSlides();
        };

        // 启动应用
        fetchData();

        setTimeout(() => {
            document.getElementById('balloonContainer').style.display = 'block'; // 显示气球
            setTimeout(() => {
                document.getElementById('balloonContainer').style.display = 'none'; // 隐藏气球后显示轮播
                document.getElementById('slideshowContainer').style.display = 'block';
                autoPlayInterval = setInterval(() => {
                    currentIndex = (currentIndex + 1) % imageFiles.length;
                    updateSlides();
                }, 3000);
            }, 2000);
        }, 40000); // 40秒后启动
    </script>
</body>

</html>
